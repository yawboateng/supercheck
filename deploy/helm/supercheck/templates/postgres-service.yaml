{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "supercheck.fullname" . }}-postgres
  labels:
    {{- include "supercheck.labels" . | nindent 4 }}
    {{- include "supercheck.postgres.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "supercheck.postgres.selectorLabels" . | nindent 4 }}
{{- end }}
