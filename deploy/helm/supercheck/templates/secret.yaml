apiVersion: v1
kind: Secret
metadata:
  name: {{ include "supercheck.fullname" . }}-secret
  labels:
    {{- include "supercheck.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database
  DATABASE_URL: {{ include "supercheck.databaseUrl" . | quote }}
  DB_PASSWORD: {{ .Values.config.database.password | quote }}

  # Redis
  REDIS_URL: {{ include "supercheck.redisUrl" . | quote }}
  REDIS_PASSWORD: {{ .Values.config.redis.password | quote }}

  # Auth
  BETTER_AUTH_SECRET: {{ .Values.config.auth.betterAuthSecret | quote }}
  SECRET_ENCRYPTION_KEY: {{ .Values.config.auth.secretEncryptionKey | quote }}

  # S3
  AWS_ACCESS_KEY_ID: {{ .Values.config.s3.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.config.s3.secretAccessKey | quote }}

  # SMTP
  SMTP_USER: {{ .Values.config.smtp.user | quote }}
  SMTP_PASSWORD: {{ .Values.config.smtp.password | quote }}

  # AI Provider Keys
  {{- if .Values.config.aiKeys.openai }}
  OPENAI_API_KEY: {{ .Values.config.aiKeys.openai | quote }}
  {{- end }}
  {{- if .Values.config.aiKeys.anthropic }}
  ANTHROPIC_API_KEY: {{ .Values.config.aiKeys.anthropic | quote }}
  {{- end }}
  {{- if .Values.config.aiKeys.azureResourceName }}
  AZURE_RESOURCE_NAME: {{ .Values.config.aiKeys.azureResourceName | quote }}
  {{- end }}
  {{- if .Values.config.aiKeys.azureApiKey }}
  AZURE_API_KEY: {{ .Values.config.aiKeys.azureApiKey | quote }}
  {{- end }}
  {{- if .Values.config.aiKeys.azureDeployment }}
  AZURE_OPENAI_DEPLOYMENT: {{ .Values.config.aiKeys.azureDeployment | quote }}
  {{- end }}
  {{- if .Values.config.aiKeys.googleGenerativeAi }}
  GOOGLE_GENERATIVE_AI_API_KEY: {{ .Values.config.aiKeys.googleGenerativeAi | quote }}
  {{- end }}
  {{- if .Values.config.aiKeys.googleVertexProject }}
  GOOGLE_VERTEX_PROJECT: {{ .Values.config.aiKeys.googleVertexProject | quote }}
  {{- end }}
  {{- if .Values.config.aiKeys.bedrockRegion }}
  BEDROCK_AWS_REGION: {{ .Values.config.aiKeys.bedrockRegion | quote }}
  {{- end }}
  {{- if .Values.config.aiKeys.bedrockAccessKeyId }}
  BEDROCK_AWS_ACCESS_KEY_ID: {{ .Values.config.aiKeys.bedrockAccessKeyId | quote }}
  {{- end }}
  {{- if .Values.config.aiKeys.bedrockSecretAccessKey }}
  BEDROCK_AWS_SECRET_ACCESS_KEY: {{ .Values.config.aiKeys.bedrockSecretAccessKey | quote }}
  {{- end }}
  {{- if .Values.config.aiKeys.bedrockSessionToken }}
  BEDROCK_AWS_SESSION_TOKEN: {{ .Values.config.aiKeys.bedrockSessionToken | quote }}
  {{- end }}
  {{- if .Values.config.aiKeys.openrouter }}
  OPENROUTER_API_KEY: {{ .Values.config.aiKeys.openrouter | quote }}
  {{- end }}

  # OAuth
  {{- if .Values.config.oauth.github.clientId }}
  GITHUB_CLIENT_ID: {{ .Values.config.oauth.github.clientId | quote }}
  {{- end }}
  {{- if .Values.config.oauth.github.clientSecret }}
  GITHUB_CLIENT_SECRET: {{ .Values.config.oauth.github.clientSecret | quote }}
  {{- end }}
  {{- if .Values.config.oauth.google.clientId }}
  GOOGLE_CLIENT_ID: {{ .Values.config.oauth.google.clientId | quote }}
  {{- end }}
  {{- if .Values.config.oauth.google.clientSecret }}
  GOOGLE_CLIENT_SECRET: {{ .Values.config.oauth.google.clientSecret | quote }}
  {{- end }}

  # Queue Alerting
  {{- if .Values.config.queueAlerting.slackWebhookUrl }}
  QUEUE_ALERT_SLACK_WEBHOOK_URL: {{ .Values.config.queueAlerting.slackWebhookUrl | quote }}
  {{- end }}
  {{- if .Values.config.queueAlerting.webhookUrl }}
  QUEUE_ALERT_WEBHOOK_URL: {{ .Values.config.queueAlerting.webhookUrl | quote }}
  {{- end }}
