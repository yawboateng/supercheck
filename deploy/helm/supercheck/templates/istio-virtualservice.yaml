{{- if and .Values.ingress.enabled (eq .Values.ingress.provider "istio") .Values.app.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "supercheck.fullname" . }}-app
  labels:
    {{- include "supercheck.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.ingress.hosts.app | quote }}
  gateways:
    - {{ include "supercheck.fullname" . }}-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: {{ include "supercheck.fullname" . }}-app
            port:
              number: {{ .Values.app.service.port }}
      timeout: 120s
      retries:
        attempts: 3
        perTryTimeout: 40s
        retryOn: 5xx,reset,connect-failure
---
# Status pages VirtualService (wildcard subdomain routing)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "supercheck.fullname" . }}-status-pages
  labels:
    {{- include "supercheck.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.ingress.hosts.statusPages | quote }}
  gateways:
    - {{ include "supercheck.fullname" . }}-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: {{ include "supercheck.fullname" . }}-app
            port:
              number: {{ .Values.app.service.port }}
      timeout: 30s
{{- end }}
