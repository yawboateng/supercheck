{{- if and .Values.ingress.enabled (eq .Values.ingress.provider "traefik") .Values.ingress.tls.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "supercheck.fullname" . }}-https-redirect
  labels:
    {{- include "supercheck.labels" . | nindent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "supercheck.fullname" . }}-headers
  labels:
    {{- include "supercheck.labels" . | nindent 4 }}
spec:
  headers:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    forceSTSHeader: true
{{- end }}
