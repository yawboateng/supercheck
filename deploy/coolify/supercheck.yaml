# documentation: https://supercheck.io/docs/app/deployment/self-hosted
# slogan: Open Source AI-Powered Test Automation & Monitoring Platform
# tags: automation, playwright, k6, testing, monitoring, ai, uptime, synthetic-monitors
# logo: svgs/supercheck.svg
# port: 3000

# Supercheck Coolify One-Click Template
# Important: run deploy/docker/setup-k3s.sh on the host first so the worker
# can mount /etc/rancher/k3s/supercheck-worker.kubeconfig and submit gVisor Jobs.
# https://github.com/supercheck-io/supercheck

# YAML anchors for shared configuration
x-common-env: &common-env # Database Configuration
  DATABASE_URL: postgresql://postgres:postgres@supercheck-db:5432/supercheck
  DB_HOST: supercheck-db
  DB_PORT: 5432
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_NAME: supercheck

  # Redis Configuration
  REDIS_HOST: supercheck-redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: supercheck-redis-password
  REDIS_URL: redis://:supercheck-redis-password@supercheck-redis:6379
  REDIS_TLS_ENABLED: false

  # App Configuration
  # Coolify auto-provides SERVICE_URL_APP - override in Coolify Environment Variables if needed
  NEXT_PUBLIC_APP_URL: ${SERVICE_URL_APP}
  APP_URL: ${SERVICE_URL_APP}
  BETTER_AUTH_URL: ${SERVICE_URL_APP}
  BETTER_AUTH_SECRET: ${SERVICE_BASE64_64_AUTH:-supercheck-auth-secret-change-me-in-production-32chars}
  NODE_ENV: production
  SHOW_COMMUNITY_LINKS: ${SHOW_COMMUNITY_LINKS:-true}
  STATUS_PAGE_HIDE_BRANDING: ${STATUS_PAGE_HIDE_BRANDING:-false}

  # App-Side Capacity Settings
  # RUNNING_CAPACITY controls how many test runs the App allows into "running" state simultaneously.
  # It is NOT a worker setting. Keep it equal to the total number of worker replicas.
  RUNNING_CAPACITY: ${RUNNING_CAPACITY:-2}
  QUEUED_CAPACITY: ${QUEUED_CAPACITY:-10}

  # Container limits
  CONTAINER_CPU_LIMIT: ${CONTAINER_CPU_LIMIT:-1.5}
  CONTAINER_MEMORY_LIMIT_MB: ${CONTAINER_MEMORY_LIMIT_MB:-2048}
  TEST_EXECUTION_TIMEOUT_MS: ${TEST_EXECUTION_TIMEOUT_MS:-300000}
  JOB_EXECUTION_TIMEOUT_MS: ${JOB_EXECUTION_TIMEOUT_MS:-3600000}
  K6_TEST_EXECUTION_TIMEOUT_MS: ${K6_TEST_EXECUTION_TIMEOUT_MS:-3600000}
  K6_JOB_EXECUTION_TIMEOUT_MS: ${K6_JOB_EXECUTION_TIMEOUT_MS:-3600000}

  # AWS S3 / MinIO Configuration
  AWS_REGION: ${AWS_REGION:-us-east-1}
  AWS_ACCESS_KEY_ID: ${SERVICE_USER_MINIO:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${SERVICE_PASSWORD_MINIO:-minioadmin}
  S3_ENDPOINT: http://minio:9000
  S3_TEST_BUCKET_NAME: ${S3_TEST_BUCKET_NAME:-playwright-test-artifacts}
  S3_JOB_BUCKET_NAME: ${S3_JOB_BUCKET_NAME:-playwright-job-artifacts}
  S3_MONITOR_BUCKET_NAME: ${S3_MONITOR_BUCKET_NAME:-playwright-monitor-artifacts}
  S3_K6_TEST_BUCKET_NAME: ${S3_K6_TEST_BUCKET_NAME:-k6-test-artifacts}
  S3_K6_JOB_BUCKET_NAME: ${S3_K6_JOB_BUCKET_NAME:-k6-job-artifacts}
  S3_STATUS_BUCKET_NAME: ${S3_STATUS_BUCKET_NAME:-status-page-artifacts}
  S3_REQUIREMENTS_BUCKET_NAME: ${S3_REQUIREMENTS_BUCKET_NAME:-test-requirement-artifacts}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
  S3_OPERATION_TIMEOUT: ${S3_OPERATION_TIMEOUT:-10000}
  S3_MAX_RETRIES: ${S3_MAX_RETRIES:-3}

  # Notification Channel Limits
  MAX_JOB_NOTIFICATION_CHANNELS: ${MAX_JOB_NOTIFICATION_CHANNELS:-10}
  MAX_MONITOR_NOTIFICATION_CHANNELS: ${MAX_MONITOR_NOTIFICATION_CHANNELS:-10}

  # Document Upload Limits
  MAX_DOCUMENT_SIZE_MB: ${MAX_DOCUMENT_SIZE_MB:-10}
  MAX_DOCUMENTS_PER_PROJECT: ${MAX_DOCUMENTS_PER_PROJECT:-100}

  # Playwright Configuration
  PLAYWRIGHT_WORKERS: ${PLAYWRIGHT_WORKERS:-1}
  PLAYWRIGHT_RETRIES: ${PLAYWRIGHT_RETRIES:-1}
  PLAYWRIGHT_TRACE: ${PLAYWRIGHT_TRACE:-retain-on-failure}
  PLAYWRIGHT_SCREENSHOT: ${PLAYWRIGHT_SCREENSHOT:-on}
  PLAYWRIGHT_VIDEO: ${PLAYWRIGHT_VIDEO:-retain-on-failure}

  # Cleanup Configuration
  MONITOR_CLEANUP_ENABLED: ${MONITOR_CLEANUP_ENABLED:-true}
  MONITOR_CLEANUP_CRON: ${MONITOR_CLEANUP_CRON:-0 2 * * *}
  MONITOR_CLEANUP_BATCH_SIZE: ${MONITOR_CLEANUP_BATCH_SIZE:-1000}
  MONITOR_PRESERVE_STATUS_CHANGES: ${MONITOR_PRESERVE_STATUS_CHANGES:-true}
  MONITOR_CLEANUP_SAFETY_LIMIT: ${MONITOR_CLEANUP_SAFETY_LIMIT:-1000000}
  MONITOR_AGGREGATES_CLEANUP_ENABLED: ${MONITOR_AGGREGATES_CLEANUP_ENABLED:-true}
  MONITOR_AGGREGATES_CLEANUP_CRON: ${MONITOR_AGGREGATES_CLEANUP_CRON:-30 2 * * *}
  MONITOR_AGGREGATES_CLEANUP_BATCH_SIZE: ${MONITOR_AGGREGATES_CLEANUP_BATCH_SIZE:-1000}
  MONITOR_AGGREGATES_CLEANUP_SAFETY_LIMIT: ${MONITOR_AGGREGATES_CLEANUP_SAFETY_LIMIT:-500000}
  JOB_RUNS_CLEANUP_ENABLED: ${JOB_RUNS_CLEANUP_ENABLED:-true}
  JOB_RUNS_CLEANUP_CRON: ${JOB_RUNS_CLEANUP_CRON:-0 3 * * *}
  JOB_RUNS_CLEANUP_BATCH_SIZE: ${JOB_RUNS_CLEANUP_BATCH_SIZE:-100}
  JOB_RUNS_CLEANUP_SAFETY_LIMIT: ${JOB_RUNS_CLEANUP_SAFETY_LIMIT:-10000}
  PLAYGROUND_CLEANUP_ENABLED: ${PLAYGROUND_CLEANUP_ENABLED:-true}
  PLAYGROUND_CLEANUP_CRON: ${PLAYGROUND_CLEANUP_CRON:-0 5 * * *}
  PLAYGROUND_CLEANUP_MAX_AGE_HOURS: ${PLAYGROUND_CLEANUP_MAX_AGE_HOURS:-24}
  WEBHOOK_CLEANUP_ENABLED: ${WEBHOOK_CLEANUP_ENABLED:-true}
  WEBHOOK_CLEANUP_CRON: ${WEBHOOK_CLEANUP_CRON:-0 4 * * *}
  WEBHOOK_CLEANUP_BATCH_SIZE: ${WEBHOOK_CLEANUP_BATCH_SIZE:-1000}
  WEBHOOK_CLEANUP_SAFETY_LIMIT: ${WEBHOOK_CLEANUP_SAFETY_LIMIT:-100000}

  # Security Configuration
  SECRET_ENCRYPTION_KEY: ${SERVICE_BASE64_64_ENCRYPTION:-supercheck-encryption-key-change-me-32ch}

  # Better Auth Admin Configuration
  MAX_PROJECTS_PER_ORG: ${MAX_PROJECTS_PER_ORG:-10}
  DEFAULT_PROJECT_NAME: ${DEFAULT_PROJECT_NAME:-Default Project}

  # SMTP Email Configuration (Optional)
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}

  # AI Features Configuration (Optional)
  AI_PROVIDER: ${AI_PROVIDER:-openai}
  AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
  AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-90000}
  AI_MAX_RETRIES: ${AI_MAX_RETRIES:-2}
  AI_TEMPERATURE: ${AI_TEMPERATURE:-0.1}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}

  # Worker Location (use "local" for single-server self-hosted mode,
  # or any enabled Super Admin location code)
  WORKER_LOCATION: ${WORKER_LOCATION:-local}

  # Self-Hosted Mode
  SELF_HOSTED: true

  # OAuth Configuration (Optional)
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

  # Chatwoot Customer Support (Cloud Only - not used in self-hosted mode)
  CHATWOOT_BASE_URL: ${CHATWOOT_BASE_URL:-}
  CHATWOOT_WEBSITE_TOKEN: ${CHATWOOT_WEBSITE_TOKEN:-}

  # CAPTCHA Configuration (Optional)
  TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
  TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}

services:
  # PostgreSQL Database
  supercheck-db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supercheck
      PGPASSWORD: postgres
    volumes:
      - supercheck-postgres-data-v10:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 1G

  # Redis Cache & Queue
  supercheck-redis:
    image: redis:8
    command: sh -c "rm -rf /data/* && redis-server --requirepass \"supercheck-redis-password\" --maxmemory 512mb --maxmemory-policy noeviction --save '' --appendonly no --protected-mode no --bind 0.0.0.0 --tcp-keepalive 300"
    volumes:
      - supercheck-redis-data-v2:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "supercheck-redis-password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${SERVICE_USER_MINIO:-minioadmin}
      MINIO_ROOT_PASSWORD: ${SERVICE_PASSWORD_MINIO:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - supercheck-minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M

  # App (Next.js Frontend + API)
  app:
    image: ghcr.io/supercheck-io/supercheck/app:${SUPERCHECK_VERSION:-latest}
    environment:
      <<: *common-env
    depends_on:
      supercheck-db:
        condition: service_healthy
      supercheck-redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - coolify
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 1G

  # Worker (NestJS Test Runner)
  worker:
    image: ghcr.io/supercheck-io/supercheck/worker:${SUPERCHECK_VERSION:-latest}
    init: true
    user: "1000:1000"
    environment:
      <<: *common-env
      WORKER_IMAGE: ghcr.io/supercheck-io/supercheck/worker:${SUPERCHECK_VERSION:-latest}
      EXECUTION_NAMESPACE: ${EXECUTION_NAMESPACE:-supercheck-execution}
      KUBECONFIG: /run/secrets/supercheck-kubeconfig
    # The long-lived worker is only the control plane.
    # Untrusted code runs in K3s Jobs under runtimeClassName: gvisor.
    read_only: true
    tmpfs:
      - /tmp:size=2G,uid=1000,gid=1000,mode=1777
      - /home/pwuser/.cache:size=256M,uid=1000,gid=1000,mode=0700
      - /home/pwuser/.npm:size=256M,uid=1000,gid=1000,mode=0700
    volumes:
      - supercheck-worker-reports:/worker/report
      - ${KUBECONFIG_FILE:-/etc/rancher/k3s/supercheck-worker.kubeconfig}:/run/secrets/supercheck-kubeconfig:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      supercheck-db:
        condition: service_healthy
      app:
        condition: service_healthy
      supercheck-redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.8"
          memory: 3G
          pids: 512
        reservations:
          cpus: "0.5"
          memory: 1G
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  supercheck-postgres-data-v10:
  supercheck-redis-data-v2:
  supercheck-minio-data:
  supercheck-worker-reports:

networks:
  coolify:
    external: true
