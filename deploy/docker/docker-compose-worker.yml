# Remote Worker Deployment
#
# Deploy this on a VPS in a different geographic region to enable
# true multi-location monitoring and performance testing.
#
# Prerequisites:
# 1. Main Supercheck instance running and accessible
# 2. Docker installed on the remote server
# 3. Local K3s + gVisor installed on the remote server (`sudo bash setup-k3s.sh`)
# 4. Network connectivity to main instance (Redis, PostgreSQL, MinIO)
#
# Usage:
#   1. Copy this file to your remote VPS
#   2. Run: sudo bash setup-k3s.sh
#   3. Create .env with connection details (see .env.example below)
#   4. Run: KUBECONFIG_FILE=/etc/rancher/k3s/supercheck-worker.kubeconfig docker compose -f docker-compose-worker.yml up -d
#
# Upgrading:
#   Set SUPERCHECK_VERSION in your .env file or shell environment:
#     SUPERCHECK_VERSION=1.4.0 docker compose -f docker-compose-worker.yml up -d
#   This updates the worker image and WORKER_IMAGE in one place.
#
# Environment Variables Required:
#   DATABASE_URL - PostgreSQL connection string to main server
#   REDIS_HOST - Redis hostname (main server IP or hostname)
#   REDIS_PORT - Redis port (default: 6379)
#   REDIS_PASSWORD - Redis password from main server
#   S3_ENDPOINT - MinIO/S3 endpoint URL (main server or cloud)
#   WORKER_LOCATION - This worker's region (must match a location code in Super Admin, e.g. local, us-east, eu-central)
#   AWS_ACCESS_KEY_ID - S3 credentials
#   AWS_SECRET_ACCESS_KEY - S3 credentials
#
# NOTE: RUNNING_CAPACITY and QUEUED_CAPACITY are App-side settings.
#   Set them only on the main server's App service, not here.
#   WORKER_REPLICAS (set below or via env) controls how many worker containers run.
# NOTE: STATUS_PAGE_HIDE_BRANDING is also App-side only.
#   Set it on the main App deployment if you want to hide the public branding footer globally.
#
# Example .env file:
# ----------------------------------------
# DATABASE_URL=postgresql://user:pass@main-server.example.com:5432/supercheck
# REDIS_HOST=main-server.example.com
# REDIS_PORT=6379
# REDIS_PASSWORD=your-redis-password
# S3_ENDPOINT=http://main-server.example.com:9000
# AWS_ACCESS_KEY_ID=minioadmin
# AWS_SECRET_ACCESS_KEY=minioadmin
# WORKER_LOCATION=us-east
# WORKER_REPLICAS=1
# ----------------------------------------

services:
  worker:
    image: ghcr.io/supercheck-io/supercheck/worker:${SUPERCHECK_VERSION:-1.3.0}
    init: true
    # GVISOR-006: Run as non-root user (pwuser UID 1000 from Playwright image)
    user: "1000:1000"
    # GVISOR-006: Read-only root filesystem with writable tmpfs mounts
    read_only: true
    tmpfs:
      - /tmp:size=2G,uid=1000,gid=1000,mode=1777
      - /home/pwuser/.cache:size=256M,uid=1000,gid=1000,mode=0700
      - /home/pwuser/.npm:size=256M,uid=1000,gid=1000,mode=0700
    environment:
      WORKER_IMAGE: ghcr.io/supercheck-io/supercheck/worker:${SUPERCHECK_VERSION:-1.3.0}
      EXECUTION_NAMESPACE: ${EXECUTION_NAMESPACE:-supercheck-execution}
      KUBECONFIG: /run/secrets/supercheck-kubeconfig

      # Database connection (required)
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required - PostgreSQL connection to main server}

      # Redis connection (required)
      # The worker uses REDIS_HOST/PORT/PASSWORD directly (not REDIS_URL)
      REDIS_HOST: ${REDIS_HOST:?REDIS_HOST is required - Redis hostname or IP of main server}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Worker location (required)
      # This determines which regional queue this worker processes.
      # Must match an enabled location code configured in Super Admin.
      # Built-in locations: local (self-hosted default), us-east, eu-central, asia-pacific (cloud defaults)
      # Custom locations can be added via Super Admin panel.
      WORKER_LOCATION: ${WORKER_LOCATION:?WORKER_LOCATION is required - set to an enabled location code from Super Admin (e.g. local, us-east)}

      # S3/MinIO storage (required)
      S3_ENDPOINT: ${S3_ENDPOINT:?S3_ENDPOINT is required - MinIO/S3 endpoint URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}

      # Playwright buckets (use same as main server)
      S3_TEST_BUCKET_NAME: ${S3_TEST_BUCKET_NAME:-playwright-test-artifacts}
      S3_JOB_BUCKET_NAME: ${S3_JOB_BUCKET_NAME:-playwright-job-artifacts}
      S3_MONITOR_BUCKET_NAME: ${S3_MONITOR_BUCKET_NAME:-playwright-monitor-artifacts}
      # K6 buckets
      S3_K6_TEST_BUCKET_NAME: ${S3_K6_TEST_BUCKET_NAME:-k6-test-artifacts}
      S3_K6_JOB_BUCKET_NAME: ${S3_K6_JOB_BUCKET_NAME:-k6-job-artifacts}
      # Status page bucket
      S3_STATUS_BUCKET_NAME: ${S3_STATUS_BUCKET_NAME:-status-page-artifacts}
      # Requirements bucket
      S3_REQUIREMENTS_BUCKET_NAME: ${S3_REQUIREMENTS_BUCKET_NAME:-test-requirement-artifacts}

      # Execution configuration
      NODE_ENV: ${NODE_ENV:-production}
      # Note: RUNNING_CAPACITY and QUEUED_CAPACITY are App-side settings only.
      # Set RUNNING_CAPACITY on the App (main server) equal to total WORKER_REPLICAS across all hosts.
      CONTAINER_CPU_LIMIT: ${CONTAINER_CPU_LIMIT:-1.5}
      CONTAINER_MEMORY_LIMIT_MB: ${CONTAINER_MEMORY_LIMIT_MB:-2048}
      TEST_EXECUTION_TIMEOUT_MS: ${TEST_EXECUTION_TIMEOUT_MS:-300000}
      JOB_EXECUTION_TIMEOUT_MS: ${JOB_EXECUTION_TIMEOUT_MS:-3600000}
      K6_TEST_EXECUTION_TIMEOUT_MS: ${K6_TEST_EXECUTION_TIMEOUT_MS:-3600000}
      K6_JOB_EXECUTION_TIMEOUT_MS: ${K6_JOB_EXECUTION_TIMEOUT_MS:-3600000}

      # Playwright configuration
      PLAYWRIGHT_WORKERS: ${PLAYWRIGHT_WORKERS:-1}
      PLAYWRIGHT_RETRIES: ${PLAYWRIGHT_RETRIES:-1}
      PLAYWRIGHT_TRACE: ${PLAYWRIGHT_TRACE:-retain-on-failure}
      PLAYWRIGHT_SCREENSHOT: ${PLAYWRIGHT_SCREENSHOT:-on}
      PLAYWRIGHT_VIDEO: ${PLAYWRIGHT_VIDEO:-retain-on-failure}

    volumes:
      - worker-playwright-reports:/worker/playwright-reports
      - worker-k6-reports:/worker/k6-reports
      - worker-reports:/worker/report
      - ${KUBECONFIG_FILE:-/etc/rancher/k3s/supercheck-worker.kubeconfig}:/run/secrets/supercheck-kubeconfig:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      replicas: ${WORKER_REPLICAS:-1}
      resources:
        limits:
          cpus: "1.8"
          memory: 3G
          pids: 512
        reservations:
          cpus: "0.5"
          memory: 1G

      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 15s
        window: 120s

    # GVISOR-006: Hardened security profile
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
volumes:
  worker-playwright-reports:
    driver: local
  worker-k6-reports:
    driver: local
  worker-reports:
    driver: local
